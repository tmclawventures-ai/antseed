appId: com.antseed.desktop
productName: AntSeed Desktop
copyright: Copyright © 2025-2026 AntSeed
electronVersion: 31.7.7
npmRebuild: false

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - assets/**/*
  - package.json
  - "!node_modules/koffi/build/koffi/linux*"
  - "!node_modules/koffi/build/koffi/win32*"
  - "!node_modules/koffi/build/koffi/freebsd*"
  - "!node_modules/koffi/build/koffi/openbsd*"
  - "!node_modules/koffi/build/koffi/musl*"

extraMetadata:
  main: dist/main/main.js

asar: true
asarUnpack:
  - "node_modules/**/*.node"
  - "node_modules/better-sqlite3/**"
  - "node_modules/bindings/**"
  - "node_modules/file-uri-to-path/**"
  - "node_modules/node-datachannel/**"
  - "node_modules/keytar/**"

extraResources:
  - from: cli-dist/
    to: cli-dist/
    filter:
      - "**/*"
  - from: ../../plugins/router-local/dist
    to: bundled-plugins/@antseed/router-local/dist
    filter:
      - "**/*.js"
  - from: ../../plugins/router-local/package.json
    to: bundled-plugins/@antseed/router-local/package.json
  - from: ../../plugins/router-local/node_modules/@antseed/router-core/dist
    to: bundled-plugins/@antseed/router-core/dist
    filter:
      - "**/*.js"
  - from: ../../plugins/router-local/node_modules/@antseed/router-core/package.json
    to: bundled-plugins/@antseed/router-core/package.json
  - from: ../../packages/node/dist
    to: bundled-plugins/@antseed/node/dist
    filter:
      - "**/*.js"
  - from: ../../packages/node/package.json
    to: bundled-plugins/@antseed/node/package.json
  - from: ../../packages/api-adapter/dist
    to: bundled-plugins/@antseed/api-adapter/dist
    filter:
      - "**/*.js"
  - from: ../../packages/api-adapter/package.json
    to: bundled-plugins/@antseed/api-adapter/package.json
  # bundled-runtime contains the full transitive runtime dependency tree of
  # @antseed/node (ethers, @silentbot1/nat-api, tokenx, ...) materialized as
  # real files by scripts/prepare-dist.mjs. We expose it under bundled-plugins
  # so plugins.ts.installPluginFromBundle can copy everything offline without
  # going through npm.
  - from: bundled-runtime/
    to: bundled-plugins/
    filter:
      - "**/*"

afterPack: ./scripts/after-pack.js

mac:
  category: public.app-category.developer-tools
  icon: assets/antseed-dock-icon.png
  identity: "Shahaf Antwarg (H3M5BXXQR2)"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  # NOTE: arch is intentionally NOT pinned here. release-mac.mjs runs
  # electron-builder once per arch (--x64, then --arm64) so each DMG / zip
  # is packed with prepare-dist's matching-arch native modules. Pinning
  # arch in the yaml would cause every invocation to build both archs and
  # collide on the second pass with "already_exists" upload errors.
  target:
    - target: dmg
    - target: zip

dmg:
  title: "${productName} ${version}"

win:
  icon: assets/antseed-dock-icon.png
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  icon: assets/antseed-dock-icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64

publish:
  provider: github
  owner: AntSeed
  repo: antseed
